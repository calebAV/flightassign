name: ATL Flight Assignments

on:
  # Runs every 15 minutes, Mon–Fri, 9:30 AM – 2:30 AM UTC (5:30 AM – 10:30 PM EDT)
  schedule:
    - cron: "*/15 9-23 * * 1-5"   # UTC 9:00–23:59 → EDT 5:00 AM–7:59 PM
    - cron: "*/15 0-2 * * 2-6"    # UTC 0:00–2:59 (next day) → EDT 8:00 PM–10:59 PM

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  assign-flights:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FlightAssign engine
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          FLEET_API_URL: ${{ secrets.FLEET_API_URL }}
        run: python engine.py
